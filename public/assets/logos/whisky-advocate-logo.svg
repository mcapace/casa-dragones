  <!-- ADVOCATE text -->
  <text x="160" y="50" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="13" font-weight="400" letter-spacing="8" fill="#F5F0E8" opacity="0.75">ADVOCATE</text>

  <!-- Thin bottom line -->
