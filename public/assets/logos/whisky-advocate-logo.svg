<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" fill="none">
  <defs>
    <linearGradient id="cream-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8E0D0" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#E8E0D0" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Thin top line -->
