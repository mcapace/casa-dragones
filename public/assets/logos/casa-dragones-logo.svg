<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8944E"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#B8944E"/>
    </linearGradient>
    <linearGradient id="gold-shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#D4B87A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Dragon motif line — stylized serpentine/dragon silhouette -->
  <g transform="translate(200, 28)" stroke="url(#gold-gradient)" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left wing/flourish -->
    <path d="M-80,0 C-70,-12 -55,-16 -40,-10 C-30,-6 -22,-14 -15,-10"/>
    <!-- Dragon body curve -->
    <path d="M-15,-10 C-8,-6 -4,-14 0,-18 C4,-14 8,-6 15,-10"/>
    <!-- Right wing/flourish (mirrored) -->
    <path d="M15,-10 C22,-14 30,-6 40,-10 C55,-16 70,-12 80,0"/>
    <!-- Small diamond/eye at center top -->
    <path d="M-4,-22 L0,-27 L4,-22 L0,-17 Z" fill="url(#gold-gradient)" stroke="none"/>
    <!-- Subtle horn lines -->
    <line x1="-6" y1="-18" x2="-10" y2="-26" opacity="0.7"/>
    <line x1="6" y1="-18" x2="10" y2="-26" opacity="0.7"/>
  </g>

  <!-- Decorative horizontal line left -->
  <line x1="40" y1="48" x2="155" y2="48" stroke="url(#gold-gradient)" stroke-width="0.5" opacity="0.6"/>
  <!-- Decorative horizontal line right -->
  <line x1="245" y1="48" x2="360" y2="48" stroke="url(#gold-gradient)" stroke-width="0.5" opacity="0.6"/>
  <!-- Small diamond separators -->
  <rect x="158" y="45" width="5" height="5" transform="rotate(45 160.5 47.5)" fill="url(#gold-gradient)" opacity="0.5"/>
  <rect x="237" y="45" width="5" height="5" transform="rotate(45 239.5 47.5)" fill="url(#gold-gradient)" opacity="0.5"/>

  <!-- CASA text -->
  <text x="200" y="76" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="30" font-weight="400" letter-spacing="14" fill="url(#gold-shimmer)">CASA</text>

  <!-- DRAGONES text -->
  <text x="200" y="102" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="22" font-weight="400" letter-spacing="10" fill="url(#gold-gradient)">DRAGONES</text>

  <!-- Subtle bottom line -->
  <line x1="120" y1="112" x2="280" y2="112" stroke="url(#gold-gradient)" stroke-width="0.4" opacity="0.4"/>
</svg>