<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Base dark gradient -->
    <radialGradient id="hero-center" cx="50%" cy="45%" r="60%" fx="50%" fy="40%">
      <stop offset="0%" stop-color="#1A1205" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#110D06" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>

    <!-- Warm amber glow top-right -->
    <radialGradient id="amber-glow-1" cx="75%" cy="20%" r="35%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#8B7355" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>

    <!-- Deep gold accent bottom-left -->
    <radialGradient id="amber-glow-2" cx="20%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#D4A547" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#1A1205" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle center spotlight -->
    <radialGradient id="spotlight" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#1F1A10" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0"/>
      <stop offset="70%" stop-color="#0A0A0A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0.9"/>
    </radialGradient>

    <!-- Gold line gradient for abstract shapes -->
    <linearGradient id="gold-line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0"/>
      <stop offset="30%" stop-color="#C9A96E" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#D4A547" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="gold-line-2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B7355" stop-opacity="0"/>
      <stop offset="40%" stop-color="#C9A96E" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#C9A96E" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8B7355" stop-opacity="0"/>
    </linearGradient>

    <!-- Noise filter for texture -->
    <filter id="hero-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="subtleNoise">
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="subtleNoise" mode="overlay"/>
    </filter>
  </defs>

  <!-- Base fill -->
  <rect width="1920" height="1080" fill="#0A0A0A"/>

  <!-- Layered atmospheric gradients -->
  <rect width="1920" height="1080" fill="url(#hero-center)"/>
  <rect width="1920" height="1080" fill="url(#amber-glow-1)"/>
  <rect width="1920" height="1080" fill="url(#amber-glow-2)"/>
  <rect width="1920" height="1080" fill="url(#spotlight)"/>

  <!-- Abstract luxury shapes — subtle diagonal lines suggesting light refracting through glass -->
  <line x1="1100" y1="0" x2="600" y2="1080" stroke="url(#gold-line)" stroke-width="1"/>
  <line x1="1200" y1="0" x2="700" y2="1080" stroke="url(#gold-line)" stroke-width="0.5"/>
  <line x1="1300" y1="0" x2="800" y2="1080" stroke="url(#gold-line-2)" stroke-width="0.8"/>

  <!-- Subtle curved shapes suggesting liquid/spirits -->
  <path d="M0,700 Q400,600 800,750 T1920,650" stroke="url(#gold-line)" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M0,750 Q500,680 960,780 T1920,700" stroke="url(#gold-line-2)" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Very subtle circle — like light through a glass -->
  <circle cx="960" cy="450" r="200" stroke="#C9A96E" stroke-width="0.3" fill="none" opacity="0.06"/>
  <circle cx="960" cy="450" r="280" stroke="#C9A96E" stroke-width="0.2" fill="none" opacity="0.04"/>

  <!-- Small diamond accents -->
  <rect x="958" y="340" width="6" height="6" transform="rotate(45 961 343)" fill="#C9A96E" opacity="0.08"/>
  <rect x="1140" y="448" width="4" height="4" transform="rotate(45 1142 450)" fill="#D4A547" opacity="0.06"/>

  <!-- Vignette overlay -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <!-- Film grain texture -->
  <rect width="1920" height="1080" filter="url(#hero-noise)" fill="transparent" opacity="0.6"/>
</svg>