<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" fill="none">
  <defs>
    <!-- Background gradient — warmer for anejo -->
    <radialGradient id="anejo-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#18120A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>

    <!-- Bottle highlight gradient — warmer amber -->
    <linearGradient id="bottle-amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914" stop-opacity="0.3"/>
      <stop offset="25%" stop-color="#D4A547" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#E0B85C" stop-opacity="0.8"/>
      <stop offset="75%" stop-color="#D4A547" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Bottle body fill — warmer -->
    <linearGradient id="bottle-fill-a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A1408" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#2C2010" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#382A16" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#2C2010" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1A1408" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Liquid gradient — deeper amber -->
    <linearGradient id="liquid-anejo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4A547" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Glow behind bottle -->
    <radialGradient id="bottle-glow-a" cx="50%" cy="40%" r="25%">
      <stop offset="0%" stop-color="#D4A547" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>

    <!-- Label gradient -->
    <linearGradient id="label-grad-a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A547" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#D4A547" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D4A547" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Vignette -->
    <radialGradient id="anejo-vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0.8"/>
    </radialGradient>

    <!-- Noise filter -->
    <filter id="prod-noise-2">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#anejo-bg)"/>

  <!-- Ambient glow -->
  <rect width="600" height="800" fill="url(#bottle-glow-a)"/>

  <!-- Bottle silhouette — slightly different shape for variety -->
  <g transform="translate(300, 70)">
    <!-- Bottle cap/stopper — more ornate -->
    <rect x="-12" y="0" width="24" height="12" rx="3" fill="#8B6914" opacity="0.5"/>
    <rect x="-8" y="12" width="16" height="8" rx="1" fill="#D4A547" opacity="0.3"/>
    <rect x="-6" y="5" width="12" height="5" rx="1" fill="#D4A547" opacity="0.2"/>

    <!-- Neck — slightly wider -->
    <rect x="-14" y="20" width="28" height="60" fill="url(#bottle-fill-a)"/>
    <line x1="-14" y1="20" x2="-14" y2="80" stroke="url(#bottle-amber)" stroke-width="0.8"/>
    <line x1="14" y1="20" x2="14" y2="80" stroke="url(#bottle-amber)" stroke-width="0.8"/>

    <!-- Neck ring -->
    <rect x="-18" y="72" width="36" height="4" rx="1" fill="#D4A547" opacity="0.15" stroke="url(#bottle-amber)" stroke-width="0.5"/>

    <!-- Shoulder curves — rounder -->
    <path d="M-14,80 C-14,100 -60,108 -60,120" stroke="url(#bottle-amber)" stroke-width="0.8" fill="none"/>
    <path d="M14,80 C14,100 60,108 60,120" stroke="url(#bottle-amber)" stroke-width="0.8" fill="none"/>
    <path d="M-14,80 C-14,100 -60,108 -60,120 L60,120 C60,108 14,100 14,80 Z" fill="url(#bottle-fill-a)"/>

    <!-- Body — slightly wider -->
    <rect x="-60" y="120" width="120" height="390" rx="4" fill="url(#bottle-fill-a)"/>
    <rect x="-60" y="120" width="120" height="390" rx="4" stroke="url(#bottle-amber)" stroke-width="0.8" fill="none"/>

    <!-- Highlight streaks -->
    <rect x="-25" y="120" width="10" height="390" rx="5" fill="#D4A547" opacity="0.05"/>
    <rect x="30" y="120" width="4" height="390" rx="2" fill="#D4A547" opacity="0.03"/>

    <!-- Label area -->
    <rect x="-48" y="210" width="96" height="130" rx="2" fill="url(#label-grad-a)"/>
    <line x1="-42" y1="220" x2="42" y2="220" stroke="#D4A547" stroke-width="0.3" opacity="0.4"/>
    <line x1="-42" y1="330" x2="42" y2="330" stroke="#D4A547" stroke-width="0.3" opacity="0.4"/>

    <!-- Label text hints -->
    <text x="0" y="255" text-anchor="middle" font-family="'Georgia', serif" font-size="7" letter-spacing="3" fill="#D4A547" opacity="0.5">CASA</text>
    <text x="0" y="270" text-anchor="middle" font-family="'Georgia', serif" font-size="5.5" letter-spacing="2" fill="#D4A547" opacity="0.4">DRAGONES</text>
    <rect x="-25" y="280" width="50" height="0.3" fill="#D4A547" opacity="0.3"/>
    <text x="0" y="298" text-anchor="middle" font-family="'Georgia', serif" font-size="5" letter-spacing="1.5" fill="#D4A547" opacity="0.35">AÑEJO</text>
    <text x="0" y="310" text-anchor="middle" font-family="'Georgia', serif" font-size="4" letter-spacing="1" fill="#D4A547" opacity="0.3">BARREL BLEND</text>

    <!-- Liquid level suggestion -->
    <rect x="-58" y="175" width="116" height="333" rx="3" fill="url(#liquid-anejo)" opacity="0.5"/>

    <!-- Bottom of bottle -->
    <path d="M-60,510 Q-60,525 -48,530 L48,530 Q60,525 60,510" fill="url(#bottle-fill-a)" stroke="url(#bottle-amber)" stroke-width="0.8"/>

    <!-- Base reflection -->
    <ellipse cx="0" cy="540" rx="65" ry="10" fill="#D4A547" opacity="0.03"/>
  </g>

  <!-- Vignette -->
  <rect width="600" height="800" fill="url(#anejo-vignette)"/>

  <!-- Product name at bottom -->
  <text x="300" y="710" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="16" letter-spacing="6" fill="#D4A547" opacity="0.85">AÑEJO</text>
  <text x="300" y="735" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="12" letter-spacing="4" fill="#D4A547" opacity="0.6">BARREL BLEND</text>

  <!-- Decorative lines around text -->
  <line x1="200" y1="695" x2="400" y2="695" stroke="#D4A547" stroke-width="0.4" opacity="0.3"/>
  <line x1="220" y1="748" x2="380" y2="748" stroke="#D4A547" stroke-width="0.3" opacity="0.2"/>

  <!-- Grain overlay -->
  <rect width="600" height="800" filter="url(#prod-noise-2)" fill="transparent" opacity="0.5"/>
</svg>